global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'shadow-ndr'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'shadow-api'
    static_configs:
      - targets: ['shadow-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'shadow-ml'
    static_configs:
      - targets: ['shadow-ml:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'shadow-ingestion'
    static_configs:
      - targets: ['shadow-ingestion:9090']
    scrape_interval: 10s

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
    scrape_interval: 15s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  - job_name: 'redis'
    static_configs:
      - targets: ['shadow-redis:6379']
    scrape_interval: 15s

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['shadow-clickhouse:8123']
    scrape_interval: 30s
